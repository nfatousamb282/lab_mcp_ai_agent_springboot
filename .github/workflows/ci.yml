name: CI & Docker Publish

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission
        working-directory: agent
        run: chmod +x gradlew

      - name: Build & Test
        working-directory: agent
        run: ./gradlew --no-daemon clean test

  docker-publish:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  kubernetes:
    runs-on: ubuntu-latest
    needs: docker-publish

    steps:
      - uses: actions/checkout@v4

      - name: Start Minikube
        uses: medyagh/setup-minikube@master

      - name: Verify cluster
        run: kubectl get nodes

      - name: Build Docker image inside Minikube
        run: |
          eval $(minikube -p minikube docker-env)
          docker build -t ai-agent:ci .

      - name: Deploy to Minikube
        working-directory: agent
        run: kubectl apply -f src/main/k8s/ai-agent-deployment.yml

      - name: Wait for pod ready
        run: |
          kubectl wait --for=condition=Ready pod -l app=ai-agent --timeout=180s
          kubectl get pods
          minikube service list

      - name: Test service health endpoint
        run: |
          kubectl port-forward svc/ai-agent 8080:8080 &
          PF_PID=$!
          sleep 5
          for i in $(seq 1 6); do
            if curl -fsS http://127.0.0.1:8080/actuator/health; then
              kill $PF_PID 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done
          kill $PF_PID 2>/dev/null || true
          exit 1

      - name: Log pods on failure
        if: failure()
        run: |
          kubectl get pods -o wide
          kubectl logs -l app=ai-agent --tail=200