github:
  owner: ${GITHUB_OWNER:ci-owner}
  repo: ${GITHUB_REPO:ci-repo}

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-opus-4-20250514
  timeout-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info
mcp:
  base-url: http://localhost:3333
  path: /mcp